<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SHARF — Auditoría Gerencial · Devoluciones TI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --N: #68002B; --S: #FF6568; --P: #FFC1C2;
  --bg: #f8f0f1; --card: #fff;
  --t1: #1a0a0e; --t2: #5c3040; --t3: #9c7080;
  --border: #f0d6d8; --ok: #16a34a; --warn: #d97706; --err: #dc2626;
  --violet: #7c3aed;
  font-family: 'Segoe UI', Arial, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);min-height:100vh}
.topbar{background:var(--N);color:#fff;padding:12px 24px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.logo{font-size:24px;font-weight:900;font-style:italic;letter-spacing:-1px}
.logo span{color:var(--P)}
.tb-right{display:flex;gap:10px;align-items:center}
.periodo-sel{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  color:#fff;padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer}
.btn-export{background:var(--S);border:none;color:#fff;padding:8px 16px;
  border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:background .15s}
.btn-export:hover{background:#e04545}
.main{max-width:1280px;margin:0 auto;padding:20px 16px}
.periodo-info{font-size:13px;color:var(--t3);margin-bottom:18px;
  display:flex;align-items:center;justify-content:space-between}
.grid-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border-radius:14px;padding:18px 20px;
  border:1px solid var(--border);position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent,var(--S))}
.kpi-val{font-size:34px;font-weight:800;color:var(--accent,var(--N));line-height:1}
.kpi-lbl{font-size:12px;color:var(--t3);margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.kpi-sub{font-size:11px;color:var(--t3);margin-top:3px}
.grid-charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.grid-charts-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px}
.card{background:var(--card);border-radius:14px;padding:18px 20px;border:1px solid var(--border)}
.card-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.card-title span{font-size:14px}
.chart-wrap{position:relative;height:220px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:12px;color:var(--t1);width:120px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;font-weight:600;flex-shrink:0}
.bar-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:var(--S);transition:width .4s}
.bar-val{font-size:11px;color:var(--t3);width:36px;text-align:right;flex-shrink:0}
.acc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.acc-item{background:var(--bg);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--border)}
.acc-val{font-size:22px;font-weight:800}
.acc-lbl{font-size:11px;color:var(--t3);margin-top:4px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.badge-ok{background:#dcfce7;color:#15803d}
.badge-warn{background:#fef3c7;color:#92400e}
.badge-err{background:#fee2e2;color:#991b1b}
.badge-v{background:#ede9fe;color:#6d28d9}
.alert-wrap{background:#fff7ed;border:1.5px solid #fed7aa;border-radius:12px;
  padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.loading{text-align:center;padding:60px 20px;color:var(--t3)}
.spinner{width:40px;height:40px;border:3px solid var(--border);
  border-top-color:var(--S);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.section-title{font-size:14px;font-weight:800;color:var(--N);
  margin:24px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--S)}
table.audit-table{width:100%;border-collapse:collapse;font-size:12px}
table.audit-table th{background:var(--N);color:#fff;padding:8px 12px;text-align:left;font-size:11px}
table.audit-table td{padding:7px 12px;border-bottom:1px solid var(--border)}
table.audit-table tr:hover td{background:var(--bg)}
@media print {
  .topbar,.btn-export,.periodo-sel{display:none!important}
  .main{padding:0}
  .card,.kpi{break-inside:avoid;border:1px solid #ccc}
}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:16px">
    <div class="logo">shar<span>f</span></div>
    <div>
      <div style="font-size:12px;font-weight:700;letter-spacing:1px">AUDITORÍA GERENCIAL</div>
      <div style="font-size:10px;color:var(--P);margin-top:1px">Devoluciones TI · Mesa de Servicio</div>
    </div>
  </div>
  <div class="tb-right">
    <select class="periodo-sel" id="selPeriodo" onchange="cargarDatos()">
      <option value="1">Último mes</option>
      <option value="3" selected>Últimos 3 meses</option>
      <option value="6">Últimos 6 meses</option>
      <option value="12">Último año</option>
      <option value="99">Todo el historial</option>
    </select>
    <button class="btn-export" onclick="exportarExcel()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Exportar Excel
    </button>
    <button class="btn-export" onclick="window.print()" style="background:var(--t2)">
      🖨️ Imprimir
    </button>
  </div>
</div>

<div class="main" id="main">
  <div class="loading">
    <div class="spinner"></div>
    <div style="font-size:14px;font-weight:600">Cargando datos de auditoría…</div>
    <div style="font-size:12px;margin-top:6px">Analizando registros del Sheet de devoluciones</div>
  </div>
</div>

<script>
// ── Datos demo para previsualizar sin GAS ─────────────────────────────
var DEMO = {
  ok: true, filas: 147, meses: 3,
  periodo: '01/01/2026 — 31/03/2026',
  resumen: { total:147, conObs:38, sinObs:109, pctObs:26, totalNoDev:23, totalCotiz:11, errSnipe:2, errEmail:4 },
  porTipo: [
    {label:'Por cese',val:72},{label:'Cambio de equipo',val:45},
    {label:'Cambio de renting',val:20},{label:'No usará',val:10}
  ],
  porTecnico: [
    {label:'Garcia Diaz, Gabriel',val:42},{label:'Sotelo Nemecio, Mauricio',val:31},
    {label:'Gomez Sime, Ismael',val:28},{label:'Gutierrez Leiva, Victor',val:24},
    {label:'Moreno Yarleque, Perla',val:14},{label:'Rojas Guevara, Alfredo',val:8}
  ],
  porEmpresa: [
    {label:'SICCSA',val:89},{label:'SLI',val:42},{label:'SR',val:11},{label:'SB',val:5}
  ],
  porArea: [
    {label:'Operaciones',val:55},{label:'Logística',val:38},{label:'TI',val:22},
    {label:'Finanzas',val:18},{label:'Comercial',val:14}
  ],
  porActivo: [{label:'Laptop',val:120},{label:'PC',val:18},{label:'Monitor',val:9}],
  porMes: [
    {mes:'2026-01',total:52},{mes:'2026-02',total:61},{mes:'2026-03',total:34}
  ],
  accNoDev: {cargador:8,mouse:6,mochila:5,docking:2,teclado:2},
  accCotiz: {cargador:4,mouse:3,mochila:2,docking:1,teclado:1}
};

var _datos = null;
var _charts = {};

// Intentar llamar GAS; si no está disponible, usar demo
function cargarDatos() {
  var meses = parseInt(document.getElementById('selPeriodo').value) || 3;
  document.getElementById('main').innerHTML =
    '<div class="loading"><div class="spinner"></div>' +
    '<div style="font-size:14px;font-weight:600">Analizando ' + meses + ' mes(es)…</div></div>';

  if (typeof google !== 'undefined' && google.script) {
    google.script.run
      .withSuccessHandler(function(r) {
        _datos = r.ok && !r.vacio ? r : DEMO;
        renderDashboard(_datos);
      })
      .withFailureHandler(function() {
        _datos = DEMO; renderDashboard(DEMO);
      })
      .handleRequest('getAuditoriaData', { meses: meses });
  } else {
    // Sin GAS: usar datos demo
    setTimeout(function() { _datos = DEMO; renderDashboard(DEMO); }, 600);
  }
}

function renderDashboard(d) {
  // Destruir charts previos
  Object.values(_charts).forEach(function(c){ try{c.destroy();}catch(e){} });
  _charts = {};

  var res = d.resumen;
  var html = '';

  // ── Encabezado de período ─────────────────────────────────────────────
  html += '<div class="periodo-info">' +
    '<span>Período analizado: <strong>' + d.periodo + '</strong></span>' +
    '<span><strong>' + res.total + '</strong> devoluciones registradas</span></div>';

  // ── KPIs ─────────────────────────────────────────────────────────────
  html += '<div class="grid-kpi">' +
    kpiCard('Total<br>Devoluciones', res.total, 'Registros en el período', 'var(--N)') +
    kpiCard('Con<br>Observaciones', res.conObs + ' <small style="font-size:18px">(' + res.pctObs + '%)</small>', 'del total procesado', 'var(--warn)') +
    kpiCard('Acc. No<br>Devueltos', res.totalNoDev, 'en todo el período', 'var(--err)') +
    kpiCard('Solicitudes<br>Cotización', res.totalCotiz, 'accesorios cotizados', 'var(--violet)') +
  '</div>';

  // ── Gráfico de barras por mes + dona por tipo ─────────────────────────
  html += '<div class="grid-charts">';
  html += '<div class="card"><div class="card-title"><span>📅</span> Devoluciones por Mes</div>' +
          '<div class="chart-wrap"><canvas id="chartMes"></canvas></div></div>';
  html += '<div class="card"><div class="card-title"><span>🔄</span> Por Tipo de Devolución</div>' +
          '<div class="chart-wrap"><canvas id="chartTipo"></canvas></div></div>';
  html += '</div>';

  // ── Por técnico + por empresa ─────────────────────────────────────────
  html += '<div class="grid-charts">';
  html += '<div class="card"><div class="card-title"><span>👷</span> Por Técnico</div>' +
          '<div id="barTec"></div></div>';
  html += '<div class="card"><div class="card-title"><span>🏢</span> Por Empresa / Área</div>' +
          '<div class="chart-wrap"><canvas id="chartEmp"></canvas></div></div>';
  html += '</div>';

  // ── Accesorios no devueltos vs cotizados ─────────────────────────────
  html += '<div class="section-title">Gestión de Accesorios</div>';
  html += '<div class="grid-charts">';
  html += '<div class="card"><div class="card-title"><span>❌</span> Accesorios No Devueltos</div>' +
          '<div class="chart-wrap"><canvas id="chartNoDev"></canvas></div></div>';
  html += '<div class="card"><div class="card-title"><span>💰</span> Accesorios Cotizados</div>' +
          '<div class="chart-wrap"><canvas id="chartCotiz"></canvas></div></div>';
  html += '</div>';

  // ── Indicadores de calidad del proceso ───────────────────────────────
  html += '<div class="section-title">Calidad del Proceso</div>';
  html += '<div class="grid-charts-3">';
  html += '<div class="card"><div class="card-title"><span>✅</span> Estado de Equipos</div>' +
          '<div class="chart-wrap"><canvas id="chartEstado"></canvas></div></div>';
  html += '<div class="card"><div class="card-title"><span>💻</span> Tipo de Activo</div>' +
          '<div class="chart-wrap"><canvas id="chartActivo"></canvas></div></div>';
  html += '<div class="card"><div class="card-title"><span>⚠️</span> Errores de Proceso</div>' +
          '<div id="errProceso" style="padding:8px 0"></div></div>';
  html += '</div>';

  // ── Tabla de top técnicos ─────────────────────────────────────────────
  html += '<div class="section-title">Ranking de Técnicos</div>';
  html += '<div class="card"><table class="audit-table"><thead><tr>' +
    '<th>#</th><th>Técnico</th><th>Devoluciones</th><th>Participación</th><th>Estado</th>' +
    '</tr></thead><tbody>';
  d.porTecnico.forEach(function(t, i) {
    var pct = res.total > 0 ? Math.round(t.val / res.total * 100) : 0;
    html += '<tr><td><strong>' + (i+1) + '</strong></td>' +
      '<td>' + t.label + '</td>' +
      '<td><strong>' + t.val + '</strong></td>' +
      '<td>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<div class="bar-track" style="width:120px"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
          '<span style="font-size:11px;color:var(--t3)">' + pct + '%</span>' +
        '</div>' +
      '</td>' +
      '<td>' + (i < 2 ? '<span class="badge badge-ok">Top</span>' : '<span class="badge badge-warn">Activo</span>') + '</td>' +
    '</tr>';
  });
  html += '</tbody></table></div>';

  document.getElementById('main').innerHTML = html;

  // ── Renderizar charts ─────────────────────────────────────────────────
  renderCharts(d);
}

function kpiCard(lbl, val, sub, color) {
  return '<div class="kpi" style="--accent:' + color + '">' +
    '<div class="kpi-val">' + val + '</div>' +
    '<div class="kpi-lbl">' + lbl + '</div>' +
    '<div class="kpi-sub">' + sub + '</div></div>';
}

function renderCharts(d) {
  var res = d.resumen;
  var COLORS = ['#FF6568','#68002B','#FFC1C2','#7c3aed','#d97706','#16a34a','#0ea5e9','#ec4899'];

  // Barras por mes
  var cM = document.getElementById('chartMes');
  if (cM && d.porMes.length) {
    var labM = d.porMes.map(function(m){
      var p=m.mes.split('-'); var ms=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      return ms[parseInt(p[1])] + ' ' + p[0];
    });
    _charts.mes = new Chart(cM, { type:'bar',
      data:{ labels:labM, datasets:[{label:'Devoluciones',data:d.porMes.map(function(m){return m.total;}),
        backgroundColor:'#FF6568',borderRadius:6}]},
      options:{ responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true,grid:{color:'#f0d6d8'},ticks:{color:'#9c7080'}},
                x:{grid:{display:false},ticks:{color:'#9c7080'}}}}
    });
  }

  // Dona por tipo
  var cT = document.getElementById('chartTipo');
  if (cT && d.porTipo.length) {
    _charts.tipo = new Chart(cT, { type:'doughnut',
      data:{ labels:d.porTipo.map(function(t){return t.label;}),
             datasets:[{data:d.porTipo.map(function(t){return t.val;}),
               backgroundColor:COLORS,borderWidth:0}]},
      options:{ responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'right',labels:{font:{size:11},color:'#5c3040',boxWidth:12}}}}
    });
  }

  // Barras técnico
  var bT = document.getElementById('barTec');
  if (bT) {
    var maxT = Math.max.apply(null, d.porTecnico.map(function(t){return t.val;})) || 1;
    bT.innerHTML = d.porTecnico.map(function(t) {
      var pct = Math.round(t.val / maxT * 100);
      var nombre = t.label.split(',')[0] || t.label;
      return '<div class="bar-row">' +
        '<div class="bar-label">' + nombre + '</div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="bar-val">' + t.val + '</div></div>';
    }).join('');
  }

  // Barras empresa
  var cE = document.getElementById('chartEmp');
  if (cE && d.porEmpresa.length) {
    _charts.emp = new Chart(cE, { type:'bar',
      data:{ labels:d.porEmpresa.map(function(e){return e.label;}),
             datasets:[{label:'Devoluciones',data:d.porEmpresa.map(function(e){return e.val;}),
               backgroundColor:COLORS,borderRadius:6}]},
      options:{ responsive:true,maintainAspectRatio:false,indexAxis:'y',
        plugins:{legend:{display:false}},
        scales:{x:{beginAtZero:true,grid:{color:'#f0d6d8'},ticks:{color:'#9c7080'}},
                y:{grid:{display:false},ticks:{color:'#9c7080'}}}}
    });
  }

  // Accesorios no devueltos
  var accL = {cargador:'Cargador',mouse:'Mouse',mochila:'Mochila',docking:'Docking',teclado:'Teclado'};
  var accKeys = Object.keys(d.accNoDev);
  var cND = document.getElementById('chartNoDev');
  if (cND) {
    _charts.noDev = new Chart(cND, { type:'bar',
      data:{ labels:accKeys.map(function(k){return accL[k]||k;}),
             datasets:[{label:'No devueltos',data:accKeys.map(function(k){return d.accNoDev[k]||0;}),
               backgroundColor:'#dc2626',borderRadius:6}]},
      options:{ responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true,grid:{color:'#fee2e2'},ticks:{color:'#9c7080'}},
                x:{grid:{display:false},ticks:{color:'#9c7080'}}}}
    });
  }

  // Cotizaciones
  var cCot = document.getElementById('chartCotiz');
  if (cCot) {
    _charts.cotiz = new Chart(cCot, { type:'bar',
      data:{ labels:accKeys.map(function(k){return accL[k]||k;}),
             datasets:[{label:'Cotizaciones',data:accKeys.map(function(k){return d.accCotiz[k]||0;}),
               backgroundColor:'#7c3aed',borderRadius:6}]},
      options:{ responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true,grid:{color:'#ede9fe'},ticks:{color:'#9c7080'}},
                x:{grid:{display:false},ticks:{color:'#9c7080'}}}}
    });
  }

  // Estado equipo
  var cEst = document.getElementById('chartEstado');
  if (cEst) {
    _charts.estado = new Chart(cEst, { type:'doughnut',
      data:{ labels:['Sin Observaciones','Con Observaciones'],
             datasets:[{data:[res.sinObs, res.conObs],
               backgroundColor:['#16a34a','#d97706'],borderWidth:0}]},
      options:{ responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{font:{size:11},color:'#5c3040',boxWidth:12}}}}
    });
  }

  // Tipo activo
  var cAct = document.getElementById('chartActivo');
  if (cAct && d.porActivo.length) {
    _charts.activo = new Chart(cAct, { type:'doughnut',
      data:{ labels:d.porActivo.map(function(a){return a.label;}),
             datasets:[{data:d.porActivo.map(function(a){return a.val;}),
               backgroundColor:COLORS,borderWidth:0}]},
      options:{ responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{font:{size:11},color:'#5c3040',boxWidth:12}}}}
    });
  }

  // Errores proceso
  var eDiv = document.getElementById('errProceso');
  if (eDiv) {
    var res2 = d.resumen;
    eDiv.innerHTML =
      '<div style="margin-bottom:10px">' +
        '<div style="font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px">Errores Snipe-IT</div>' +
        '<div style="font-size:28px;font-weight:800;color:' + (res2.errSnipe > 0 ? 'var(--err)' : 'var(--ok)') + '">' + res2.errSnipe + '</div>' +
        '<div style="font-size:11px;color:var(--t3)">checkins fallidos</div>' +
      '</div>' +
      '<div>' +
        '<div style="font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px">Errores Email</div>' +
        '<div style="font-size:28px;font-weight:800;color:' + (res2.errEmail > 0 ? 'var(--warn)' : 'var(--ok)') + '">' + res2.errEmail + '</div>' +
        '<div style="font-size:11px;color:var(--t3)">notificaciones no enviadas</div>' +
      '</div>' +
      '<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">' +
        '<div style="font-size:11px;color:var(--t3)">Tasa de éxito Snipe</div>' +
        '<div style="font-size:18px;font-weight:800;color:var(--ok)">' +
          Math.round((d.filas - res2.errSnipe) / d.filas * 100) + '%</div>' +
      '</div>';
  }
}

// ── Exportar a Excel (CSV) ────────────────────────────────────────────
function exportarExcel() {
  if (!_datos) return;
  var d = _datos;
  var rows = [
    ['SHARF — Informe de Auditoría Gerencial · Devoluciones TI'],
    ['Período:', d.periodo],
    ['Total devoluciones:', d.resumen.total],
    [],
    ['=== KPIs PRINCIPALES ==='],
    ['Indicador','Valor'],
    ['Total devoluciones', d.resumen.total],
    ['Con observaciones', d.resumen.conObs + ' (' + d.resumen.pctObs + '%)'],
    ['Sin observaciones', d.resumen.sinObs],
    ['Accesorios no devueltos', d.resumen.totalNoDev],
    ['Solicitudes de cotización', d.resumen.totalCotiz],
    ['Errores Snipe-IT', d.resumen.errSnipe],
    ['Errores Email', d.resumen.errEmail],
    [],
    ['=== DEVOLUCIONES POR MES ==='],
    ['Mes','Total']
  ];
  d.porMes.forEach(function(m){ rows.push([m.mes, m.total]); });

  rows.push([], ['=== POR TIPO DE DEVOLUCIÓN ==='], ['Tipo','Cantidad']);
  d.porTipo.forEach(function(t){ rows.push([t.label, t.val]); });

  rows.push([], ['=== POR TÉCNICO ==='], ['Técnico','Devoluciones']);
  d.porTecnico.forEach(function(t){ rows.push([t.label, t.val]); });

  rows.push([], ['=== POR EMPRESA ==='], ['Empresa','Devoluciones']);
  d.porEmpresa.forEach(function(e){ rows.push([e.label, e.val]); });

  rows.push([], ['=== POR ÁREA ==='], ['Área','Devoluciones']);
  d.porArea.forEach(function(a){ rows.push([a.label, a.val]); });

  rows.push([], ['=== ACCESORIOS NO DEVUELTOS ==='], ['Accesorio','Cantidad']);
  var accL = {cargador:'Cargador',mouse:'Mouse',mochila:'Mochila',docking:'Docking',teclado:'Teclado'};
  Object.keys(d.accNoDev).forEach(function(k){ rows.push([accL[k]||k, d.accNoDev[k]]); });

  rows.push([], ['=== ACCESORIOS COTIZADOS ==='], ['Accesorio','Cantidad']);
  Object.keys(d.accCotiz).forEach(function(k){ rows.push([accL[k]||k, d.accCotiz[k]]); });

  var csv = rows.map(function(r){
    return r.map(function(c){ return '"' + String(c||'').replace(/"/g,'""') + '"'; }).join(',');
  }).join('\n');

  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href   = url;
  a.download = 'SHARF_Auditoria_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// Iniciar al cargar
window.addEventListener('load', cargarDatos);
